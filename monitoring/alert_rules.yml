# Prometheus告警规则
groups:
  - name: finance-assistant-alerts
    rules:
      # 应用健康检查
      - alert: AppDown
        expr: up{job="finance-assistant-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "财务助手应用服务下线"
          description: "应用服务已下线超过1分钟"

      # 高错误率
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "应用错误率过高"
          description: "5xx错误率超过10%，持续2分钟"

      # 响应时间过长
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "应用响应时间过长"
          description: "95%分位响应时间超过2秒，持续3分钟"

      # 数据库连接问题
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "数据库服务下线"
          description: "PostgreSQL数据库服务不可用"

      # 数据库连接数过高
      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接数过高"
          description: "数据库连接数超过80，可能存在连接泄露"

      # Redis服务问题
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis服务下线"
          description: "Redis缓存服务不可用"

      # 内存使用率过高
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "系统内存使用率过高"
          description: "内存使用率超过90%，持续5分钟"

      # CPU使用率过高
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "系统CPU使用率过高"
          description: "CPU使用率超过80%，持续5分钟"

      # 磁盘空间不足
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "可用磁盘空间少于10%"

      # AI服务调用失败率过高
      - alert: HighAIServiceFailureRate
        expr: rate(ai_service_requests_total{status="failed"}[5m]) / rate(ai_service_requests_total[5m]) > 0.2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "AI服务调用失败率过高"
          description: "AI服务调用失败率超过20%，持续3分钟"

      # 用户注册异常
      - alert: HighRegistrationFailureRate
        expr: rate(user_registration_total{status="failed"}[10m]) / rate(user_registration_total[10m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "用户注册失败率过高"
          description: "用户注册失败率超过30%，持续5分钟"

      # 支付集成异常
      - alert: PaymentIntegrationFailure
        expr: rate(payment_integration_requests_total{status="failed"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "支付集成服务异常"
          description: "支付集成失败率异常，需要立即检查"

      # WebSocket连接异常
      - alert: HighWebSocketDisconnections
        expr: rate(websocket_disconnections_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket连接异常断开过多"
          description: "WebSocket连接断开率过高，可能影响实时同步"