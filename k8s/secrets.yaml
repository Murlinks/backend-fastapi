apiVersion: v1
kind: Secret
metadata:
  name: finance-app-secrets
  namespace: finance-assistant
type: Opaque
stringData:
  # 数据库凭证
  DATABASE_USER: "finance_user"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis密码
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # 应用密钥
  SECRET_KEY: "CHANGE_ME_TO_RANDOM_32_CHARS_OR_MORE"
  JWT_SECRET_KEY: "CHANGE_ME_TO_RANDOM_32_CHARS_OR_MORE"
  
  # AI服务密钥
  DEEPSEEK_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # 第三方服务密钥
  WECHAT_APP_ID: "CHANGE_ME_IN_PRODUCTION"
  WECHAT_APP_SECRET: "CHANGE_ME_IN_PRODUCTION"
  ALIPAY_APP_ID: "CHANGE_ME_IN_PRODUCTION"
  ALIPAY_PRIVATE_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # 短信服务
  SMS_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION"
  SMS_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # 语音识别服务
  XUNFEI_APP_ID: "CHANGE_ME_IN_PRODUCTION"
  XUNFEI_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  XUNFEI_API_SECRET: "CHANGE_ME_IN_PRODUCTION"
  BAIDU_APP_ID: "CHANGE_ME_IN_PRODUCTION"
  BAIDU_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  BAIDU_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: finance-assistant
type: Opaque
stringData:
  POSTGRES_USER: "finance_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "finance_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: finance-assistant
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
