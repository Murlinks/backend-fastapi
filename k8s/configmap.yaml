apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-app-config
  namespace: finance-assistant
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "finance_db"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # 应用配置
  API_V1_PREFIX: "/api/v1"
  CORS_ORIGINS: '["*"]'
  # 监控配置
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "9090"
